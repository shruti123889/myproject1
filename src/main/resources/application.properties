# Port setting (Render ke liye sahi hai)
server.port=${PORT:8080}
server.address=0.0.0.0

# Database variables ke naam badal dein
spring.datasource.url=${MY_DB_URL}
spring.datasource.username=${MY_DB_USER}
spring.datasource.password=${MY_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA settings (Sahi hain)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect