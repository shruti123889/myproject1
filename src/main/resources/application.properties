# Port setting (Render automatically sets PORT to 10000)
server.port=${PORT:8080}
server.address=0.0.0.0

# Database variables (Using new names to avoid circular reference)
spring.datasource.url=${MY_DB_URL}
spring.datasource.username=${MY_DB_USER}
spring.datasource.password=${MY_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway fix (This will stop the 'Exited with status 1' error)
spring.flyway.enabled=false