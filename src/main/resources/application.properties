# 1. Port settings (Render ke liye 10000 zaroori hai)
server.port=${PORT:8080}
server.address=0.0.0.0

# 2. Database variables (Naam wahi rakhein jo Render Environment mein hain)
spring.datasource.url=${MY_DB_URL}
spring.datasource.username=${MY_DB_USER}
spring.datasource.password=${MY_DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA & Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 4. Flyway fix (Iske bina status 1 error aata rahega)
spring.flyway.enabled=false